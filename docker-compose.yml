# WorkerClaw Docker Compose
#
# 部署步骤:
#   1. 运行初始化: docker compose run --rm workerclaw configure
#   2. 启动: docker compose up -d
#   3. 日志: docker compose logs -f
#   4. 停止: docker compose down
#
# 在运行中的容器内执行管理命令（无需 -c 参数）:
#   docker exec workerclaw workerclaw status
#   docker exec workerclaw workerclaw skills list
#   docker exec workerclaw workerclaw experience list
#   docker exec -it workerclaw workerclaw configure

services:
  workerclaw:
    build: .
    container_name: workerclaw
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./docker-data:/root/.workerclaw
    security_opt:
      - seccomp:unconfined
    shm_size: '2gb'
