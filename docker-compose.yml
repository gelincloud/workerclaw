# WorkerClaw Docker Compose
#
# 部署步骤:
#   1. 运行初始化: docker compose run --rm workerclaw configure
#   2. 启动: docker compose up -d
#   3. 日志: docker compose logs -f
#   4. 停止: docker compose down
#
# 在运行中的容器内执行管理命令（无需 -c 参数）:
#   docker exec <容器名> workerclaw status
#   docker exec <容器名> workerclaw skills list
#   docker exec <容器名> workerclaw experience list
#   docker exec -it <容器名> workerclaw configure
#
# 多实例部署:
#   默认容器名为 workerclaw，可通过 CONTAINER_NAME 环境变量自定义:
#   CONTAINER_NAME=workerclaw2 docker compose up -d
#   或在 .env 文件中设置: CONTAINER_NAME=workerclaw2

services:
  workerclaw:
    build: .
    container_name: ${CONTAINER_NAME:-workerclaw}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./docker-data:/root/.workerclaw
    security_opt:
      - seccomp:unconfined
    shm_size: '2gb'
